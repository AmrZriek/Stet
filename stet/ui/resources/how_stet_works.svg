<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="background:#121315; font-family:'IBM Plex Mono', 'Consolas', monospace;">
  <!-- Background border -->
  <rect width="800" height="400" fill="#121315" stroke="#28292c" stroke-width="2" />

  <!-- Title -->
  <text x="400" y="45" font-size="18" font-weight="700" fill="#ededee" letter-spacing="2" text-anchor="middle">HOW STET WORKS</text>
  <line x1="340" y1="55" x2="460" y2="55" stroke="#d4a373" stroke-width="1.5"/>

  <!-- Step 1: Select Text -->
  <g transform="translate(40, 100)">
    <!-- Box Border & Background -->
    <rect width="210" height="200" fill="#090a0b" stroke="#28292c" stroke-width="1.5"/>
    <text x="15" y="30" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1">1. SELECT TEXT</text>
    
    <!-- Text Editor Mockup -->
    <rect x="15" y="50" width="180" height="110" fill="#121315" stroke="#28292c" stroke-width="1"/>
    <!-- Simulated selection -->
    <rect x="25" y="85" width="105" height="18" fill="#d4a373" fill-opacity="0.3"/>
    <text x="25" y="75" font-size="11" fill="#4b5563">Yesterday morning...</text>
    <text x="25" y="98" font-size="11" font-weight="600" fill="#ededee">him and me was <tspan fill="#4b5563" font-weight="normal">late</tspan></text>
    <text x="25" y="121" font-size="11" fill="#4b5563">because of traffic.</text>
    
    <!-- Hand/Cursor Icon (Square caret-like cursor) -->
    <rect x="125" y="85" width="2" height="18" fill="#d4a373" />
    
    <text x="105" y="185" font-size="11" fill="#d4a373" font-weight="600" text-anchor="middle">Select text in any app</text>
  </g>

  <!-- Flow Arrow 1 -->
  <g stroke="#d4a373" stroke-width="1.5" fill="none">
    <path d="M 260 200 L 285 200" />
    <path d="M 280 196 L 286 200 L 280 204" fill="#d4a373" />
  </g>

  <!-- Step 2: Press F9 -->
  <g transform="translate(295, 100)">
    <rect width="210" height="200" fill="#090a0b" stroke="#28292c" stroke-width="1.5"/>
    <text x="15" y="30" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1">2. PRESS HOTKEY</text>

    <!-- F9 Keycap (Square style matching Stet UI buttons) -->
    <g transform="translate(60, 55)">
      <!-- Key base shadow -->
      <rect x="3" y="3" width="86" height="76" fill="#1c1d1f" stroke="#28292c" stroke-width="1.5"/>
      <!-- Key body -->
      <rect x="0" y="0" width="86" height="76" fill="#121315" stroke="#3a3b3f" stroke-width="1.5"/>
      <!-- Inner text -->
      <text x="43" y="47" font-size="24" font-weight="700" fill="#d4a373" text-anchor="middle">F9</text>
    </g>
    
    <text x="105" y="185" font-size="11" fill="#d4a373" font-weight="600" text-anchor="middle">Press correction hotkey</text>
  </g>

  <!-- Flow Arrow 2 -->
  <g stroke="#d4a373" stroke-width="1.5" fill="none">
    <path d="M 515 200 L 540 200" />
    <path d="M 535 196 L 541 200 L 535 204" fill="#d4a373" />
  </g>

  <!-- Step 3: Result -->
  <g transform="translate(550, 100)">
    <rect width="210" height="200" fill="#090a0b" stroke="#28292c" stroke-width="1.5"/>
    <text x="15" y="30" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1">3. FIXED INSTANTLY</text>

    <!-- Output Mockup -->
    <rect x="15" y="50" width="180" height="110" fill="#121315" stroke="#28292c" stroke-width="1"/>
    <g transform="translate(25, 65)">
      <!-- Strikeout Red line -->
      <rect x="0" y="5" width="125" height="18" fill="#ef4444" fill-opacity="0.15" />
      <text x="5" y="18" font-size="9" fill="#ef4444" text-decoration="line-through">- him and me was late</text>
      
      <!-- Corrected Green line -->
      <rect x="0" y="30" width="125" height="18" fill="#10b981" fill-opacity="0.15" />
      <text x="5" y="43" font-size="9" font-weight="600" fill="#10b981">+ He and I were late</text>
      
      <text x="0" y="75" font-size="10" fill="#4b5563">because of traffic.</text>
    </g>

    <text x="105" y="185" font-size="11" fill="#d4a373" font-weight="600" text-anchor="middle">Corrected automatically</text>
  </g>
</svg>
